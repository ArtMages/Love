<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love you</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
    width:100vw;
    height:100vh;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W,H,CX,CY,SCALE;

const DPR = Math.min(window.devicePixelRatio || 1, 2);

const TEXT = "I love you";
const COUNT = 60;
const items = [];

function resize(){
    W = window.innerWidth;
    H = window.innerHeight;

    canvas.width = W * DPR;
    canvas.height = H * DPR;

    ctx.setTransform(1,0,0,1,0,0);
    ctx.scale(DPR,DPR);

    CX = W / 2;
    CY = H / 2;

    SCALE = Math.min(W,H) * 0.018;
}

function heart(t){
    const x = 16 * Math.pow(Math.sin(t),3);

    const y =
        13 * Math.cos(t) -
        5 * Math.cos(2*t) -
        2 * Math.cos(3*t) -
        Math.cos(4*t);

    return {
        x: x * SCALE,
        y: -y * SCALE
    };
}

for(let i=0;i<COUNT;i++){
    items.push({
        t:(i/COUNT)*Math.PI*2,
        speed:0.006 + Math.random()*0.003
    });
}

function draw(){

    ctx.fillStyle = "rgba(0,0,0,0.18)";
    ctx.fillRect(0,0,W,H);

    items.forEach(item=>{

        item.t += item.speed;

        const p1 = heart(item.t);
        const p2 = heart(item.t + 0.02);

        ctx.save();

        ctx.translate(
            CX + p1.x,
            CY + p1.y
        );

        const glow =
            20 +
            10 * Math.sin(
                performance.now()*0.004 +
                item.t
            );

        ctx.font = "bold 18px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        ctx.shadowColor = "#ff5fb2";
        ctx.shadowBlur = glow;

        ctx.fillStyle = "#ff9ad5";
        ctx.fillText(TEXT,0,0);

        ctx.restore();
    });

    requestAnimationFrame(draw);
}

window.addEventListener("resize",resize);

resize();

ctx.fillStyle = "#000";
ctx.fillRect(0,0,W,H);

draw();
</script>

</body>
</html>
